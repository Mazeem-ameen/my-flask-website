<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Flask Site</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="{{ url_for('home') }}">FlaskSite</a>
      <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('contact') }}">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container hero">
    <section>
      <p class="eyebrow">Welcome</p>
      <h1>Build a small Flask website with style.</h1>
      <p class="lead">This starter page includes responsive navigation and clean layout for your next project.</p>
      <a class="btn" href="{{ url_for('about') }}">Learn More</a>
    </section>
  </main>

  <script>
    const toggle = document.querySelector('.menu-toggle');
    const links = document.querySelector('.nav-links');

    if (toggle && links) {
      toggle.addEventListener('click', () => {
        links.classList.toggle('open');
      });
    }
  </script>
</body>
</html>
